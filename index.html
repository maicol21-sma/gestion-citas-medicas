<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Pacientes</title>
    <div id="mensaje"></div>
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

<div class="container">

    <h1>SISTEMA DE GESTIÓN DE CITAS</h1>
    <h2>Gestión de Pacientes</h2>

    <!-- FORMULARIO -->
    <div class="formulario">

        <input type="text" id="nombre" placeholder="Nombre">
        <input type="text" id="apellido" placeholder="Apellido">

        <select id="tipoDoc">
            <option value="">Tipo de Documento</option>
            <option value="CC">CC</option>
            <option value="TI">TI</option>
        </select>

        <input type="text" id="documento" placeholder="Número de Documento" oninput="validarNumero(this)">
        <input type="email" id="correo" placeholder="Correo">
        <input type="text" id="direccion" placeholder="Dirección">
        <input type="text" id="telefono" placeholder="Teléfono" oninput="validarNumero(this)">

        <select id="genero">
            <option value="">Género</option>
            <option>Masculino</option>
            <option>Femenino</option>
        </select>

        <input type="text" id="eps" placeholder="EPS">

    </div>

    <!-- BOTONES -->
    <div class="botones">
        <button onclick="guardarPaciente()">Guardar</button>
    </div>

    <!-- TABLA -->
    <h3>Lista de Pacientes</h3>
    <table id="tablaPacientes">
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Documento</th>
                <th>Teléfono</th>
                <th>Correo</th>
                <th>EPS</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

</div>

<script src="js/script.js"></script>
</body>
</html>
